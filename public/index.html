<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Asistente de citas por WhatsApp · Studio Bella</title>
  <meta name="theme-color" content="#075e54" />
  <meta name="description" content="Asistente de citas por WhatsApp para salones: contesta a tus clientas al instante y agenda citas solo, 24/7. Pruébalo." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Asistente de citas por WhatsApp para salones" />
  <meta property="og:description" content="Contesta a cada clienta en segundos y agenda citas solo, 24/7 — directo en WhatsApp. Pruébalo tú mismo." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="phone">
    <!-- Chat header -->
    <header class="chat-header">
      <button class="icon-btn" title="Atrás">&#8592;</button>
      <div class="avatar" id="avatar">SB</div>
      <div class="who">
        <div class="name" id="salonName">Studio Bella</div>
        <div class="status" id="statusLine">en línea</div>
      </div>
      <div class="header-actions">
        <span class="mode-badge" id="modeBadge">MOCK</span>
        <svg class="hdr-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 10.5V7c0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h12c.6 0 1-.4 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        <svg class="hdr-ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
        <button class="icon-btn" id="resetBtn" title="Reiniciar conversación">&#8635;</button>
      </div>
    </header>

    <!-- Messages -->
    <main class="chat" id="chat">
      <div class="day-divider"><span>HOY</span></div>
      <div class="encryption-note">
        🔒 Los mensajes están cifrados de extremo a extremo. Demo de asistente de citas.
      </div>
    </main>

    <!-- Quick replies -->
    <div class="suggestions" id="suggestions"></div>

    <!-- Composer -->
    <footer class="composer">
      <button class="icon-btn round" id="reminderBtn" title="Simular recordatorio (demo)">🔔</button>
      <input id="input" type="text" autocomplete="off"
             placeholder="Escribe un mensaje" />
      <button class="send-btn" id="sendBtn" title="Enviar">&#10148;</button>
    </footer>
  </div>

  <p class="hint">
    Pruébalo: escribe como una clienta para agendar una cita · toca 🔔 para ver el recordatorio automático
  </p>

  <script src="/app.js"></script>
</body>
</html>
