<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reserva tu cita</title>
  <meta name="theme-color" content="#6b2d5c" />
  <meta name="description" content="Agenda tu cita en segundos con nuestro asistente. Disponible 24/7." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Reserva tu cita" />
  <meta property="og:description" content="Agenda tu cita en segundos con nuestro asistente. Disponible 24/7." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="phone">
    <!-- Chat header -->
    <header class="chat-header">
      <div class="avatar" id="avatar">SB</div>
      <div class="who">
        <div class="name" id="salonName">Studio Bella</div>
        <div class="status" id="statusLine">Asistente de citas · responde al instante</div>
      </div>
      <div class="header-actions">
        <span class="mode-badge" id="modeBadge">MOCK</span>
        <button class="icon-btn" id="resetBtn" title="Reiniciar conversación">&#8635;</button>
      </div>
    </header>

    <!-- Messages -->
    <main class="chat" id="chat">
      <div class="day-divider"><span>HOY</span></div>
      <div class="encryption-note">
        💇 Agenda tu cita en segundos. Escríbenos qué servicio te gustaría.
      </div>
    </main>

    <!-- Quick replies -->
    <div class="suggestions" id="suggestions"></div>

    <!-- Composer -->
    <footer class="composer">
      <button class="icon-btn round" id="reminderBtn" title="Simular recordatorio (demo)">🔔</button>
      <input id="input" type="text" autocomplete="off"
             placeholder="Escribe un mensaje" />
      <button class="send-btn" id="sendBtn" title="Enviar">&#10148;</button>
    </footer>
  </div>

  <p class="hint">
    Agenda tu cita en segundos — escríbenos qué servicio y para cuándo.
  </p>

  <script src="/app.js"></script>
</body>
</html>
